<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SHATTER REPORTER</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; text-align: center; padding: 50px; }
        h1 { font-size: 3em; color: #ff0040; text-shadow: 0 0 20px #ff0040; }
        .sub { color: #888; font-size: 1.1em; letter-spacing: 2px; }
        .box { background: #1a1a1a; max-width: 400px; margin: 30px auto; padding: 30px; border-radius: 12px; border: 1px solid #ff004033; }
        input { width: 80%; padding: 12px; margin: 8px 0; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; color: #fff; }
        button { padding: 12px 40px; background: #ff0040; color: #0a0a0a; border: none; border-radius: 40px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        button:hover { box-shadow: 0 0 30px #ff004066; }
        .error { color: #ff0040; }
        footer { margin-top: 50px; color: #444; }
        .captcha-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }
        .captcha-box input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .captcha-box label { color: #ccc; font-size: 0.9em; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SHATTER REPORTER</h1>
    <p class="sub">Breaking The Limits</p>
    <div class="box">
        <form method="POST" onsubmit="return validateCaptcha()">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <div class="captcha-box">
                <input type="checkbox" id="captcha" required>
                <label for="captcha">I'm not a robot</label>
            </div>
            <button type="submit">Login</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
    <footer>Owned by Evil Shatter 👑 & Developed by Her Lover 🍂</footer>
    <script>
        function validateCaptcha() {
            const checkbox = document.getElementById('captcha');
            if (!checkbox.checked) {
                alert('Please verify you are human by ticking the box.');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
