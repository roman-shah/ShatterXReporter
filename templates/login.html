<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SHATTER REPORTER</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            font-size: 3em;
            color: #ff0040;
            text-shadow: 0 0 20px #ff0040;
            letter-spacing: 2px;
        }
        .sub {
            color: #888;
            font-size: 1.1em;
            letter-spacing: 2px;
            margin-top: -10px;
        }
        .box {
            background: #1a1a1a;
            max-width: 400px;
            margin: 30px auto;
            padding: 30px 20px;
            border-radius: 12px;
            border: 1px solid #ff004033;
            box-shadow: 0 0 30px #ff004022;
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 8px 0;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1em;
        }
        input:focus {
            border-color: #ff0040;
            outline: none;
        }
        button {
            padding: 12px 40px;
            background: #ff0040;
            color: #0a0a0a;
            border: none;
            border-radius: 40px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            box-shadow: 0 0 30px #ff004066;
            transform: scale(1.02);
        }
        footer {
            margin-top: 50px;
            color: #444;
            font-size: 0.8em;
            letter-spacing: 1px;
        }
        .error {
            color: #ff0040;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>SHATTER REPORTER</h1>
    <p class="sub">Breaking The Limits</p>
    <div class="box">
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
    <footer>Owned by Evil Shatter 👑 & Developed by Her Lover 🍂</footer>
</body>
  </html>
