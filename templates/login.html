<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SHATTER REPORTER</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; text-align: center; padding: 50px; }
        h1 { font-size: 3em; color: #ff0040; text-shadow: 0 0 20px #ff0040; }
        .sub { color: #888; font-size: 1.1em; letter-spacing: 2px; }
        .box { background: #1a1a1a; max-width: 400px; margin: 30px auto; padding: 30px; border-radius: 12px; border: 1px solid #ff004033; }
        input { width: 80%; padding: 12px; margin: 8px 0; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; color: #fff; }
        button { padding: 12px 40px; background: #ff0040; color: #0a0a0a; border: none; border-radius: 40px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        button:hover { box-shadow: 0 0 30px #ff004066; }
        .error { color: #ff0040; }
        footer { margin-top: 50px; color: #444; }
        .captcha { color: #0f0; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>SHATTER REPORTER</h1>
    <p class="sub">Breaking The Limits</p>
    <div class="box">
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <p class="captcha">🤖 {{ captcha }}</p>
            <input type="text" name="captcha" placeholder="Enter answer" required><br>
            <button type="submit">Login</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
    <footer>Owned by Evil Shatter 👑 & Developed by Her Lover 🍂</footer>
</body>
</html>
